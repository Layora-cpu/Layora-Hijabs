<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layora Checkout</title>

<style>
body{
font-family:Arial,sans-serif;
background:#faf3f6;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#8b5a6b;
}

input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#d86c9f;
color:#fff;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#bf4e84;
}

#result{
margin-top:20px;
text-align:center;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Layora Checkout</h1>

<form id="checkoutForm">

<input id="name" placeholder="Full Name" required>

<input id="phone" placeholder="Phone Number" required>

<input id="email" placeholder="Email">

<textarea id="address" placeholder="Delivery Address" required></textarea>

<input id="products" placeholder="Products" required>

<input id="quantity" placeholder="Quantity" required>

<input id="total" placeholder="Total Amount" required>

<select id="payment">
<option>Cash On Delivery</option>
<option>UPI</option>
</select>

<button type="submit">
Place Order
</button>

</form>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
